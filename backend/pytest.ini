# ==============================================================
# pytest 設定
#
# 実行: pytest
# カバレッジ付き: pytest --cov=. --cov-report=term-missing
# ==============================================================

[pytest]
# テスト実行時に使用する Django 設定モジュール
DJANGO_SETTINGS_MODULE = config.settings.dev

# テストファイルの検索対象ディレクトリ
testpaths = tests

# テストファイルのパターン
python_files = test_*.py
python_classes = Test*
python_functions = test_*
