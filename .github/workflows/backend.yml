name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-secret-key-not-used-in-production
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: pytest

      - name: Validate OpenAPI schema
        run: python manage.py spectacular --file schema.yaml --validate

      - name: Django deploy security check (prod settings)
        env:
          DJANGO_SETTINGS_MODULE: config.settings.prod
          DJANGO_SECRET_KEY: ci-only-secret-key-must-be-50-chars-or-longer-to-pass-security-check
          DJANGO_ALLOWED_HOSTS: neon-church.com
          CSRF_TRUSTED_ORIGINS: https://neon-church.com
          CORS_ALLOWED_ORIGINS: https://neon-church.com
          POSTGRES_DB: neon
          POSTGRES_USER: neon
          POSTGRES_PASSWORD: neon
        # 本番設定でセキュリティ系チェック（HSTS / Secure Cookie / SSL Redirect 等）が通るかを確認する。
        # 本番環境変数の取り違えで保護が外れるリグレッションを CI で検出する目的。
        run: python manage.py check --deploy --tag security --fail-level WARNING
