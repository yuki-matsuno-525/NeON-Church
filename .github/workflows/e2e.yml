name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: neon_church_e2e
          POSTGRES_USER: neon_user
          POSTGRES_PASSWORD: neon_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: ci-secret-key-for-e2e
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost:3000
      POSTGRES_DB: neon_church_e2e
      POSTGRES_USER: neon_user
      POSTGRES_PASSWORD: neon_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      PLAYWRIGHT_API_BASE: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────────────
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Migrate database
        working-directory: backend
        run: python manage.py migrate

      - name: Import gospel data
        working-directory: backend
        run: python manage.py import_gospel --path ../text

      - name: Start backend server
        working-directory: backend
        run: python manage.py runserver 0.0.0.0:8000 &

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/healthz/ && break
            sleep 2
          done

      # ── Frontend ─────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start frontend server
        working-directory: frontend
        run: npm run start &

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ && break
            sleep 2
          done

      # ── Playwright ───────────────────────────────────────────
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
